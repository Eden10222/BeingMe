<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>🌌 심리테스트</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>🌌 나를 찾는 우주 테스트</h1>

<div class="grid" id="list"></div>

<script src="data.js"></script>

<script>
const container = document.getElementById("list");

Object.keys(data).forEach(key => {
  const t = data[key];

  container.innerHTML += `
    <a href="quiz.html?test=${key}" class="card">
      <h2>${t.title}</h2>
      <p>✨ 지금 바로 확인</p>
    </a>
  `;
});
</script>

</body>
</html>
