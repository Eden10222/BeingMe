<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>결과</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="result-box">
  <h1 id="title"></h1>
  <p id="desc"></p>

  <button onclick="copyLink()">공유하기</button>
  <br><br>
  <a href="index.html">다른 테스트 하기</a>
</div>

<script>
const params = new URLSearchParams(location.search);
const type = params.get("type");

const results = {
  A: {
    title: "🔥 외향형",
    desc: "활발하고 에너지 넘치는 스타일"
  },
  B: {
    title: "🌿 내향형",
    desc: "차분하고 깊이 있는 스타일"
  }
};

document.getElementById("title").innerText = results[type].title;
document.getElementById("desc").innerText = results[type].desc;

function copyLink() {
  navigator.clipboard.writeText(window.location.href);
  alert("복사됨!");
}
</script>

</body>
</html>
