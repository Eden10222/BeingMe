<body>

<div class="result-box">
  <h1 id="title"></h1>
  <p id="desc"></p>
</div>

<script src="quiz.js"></script>

<script>
const params = new URLSearchParams(location.search);
const testName = params.get("test");
const resultIndex = params.get("result");

const testData = data[testName];

if (!testData) {
  document.getElementById("title").innerText = "오류 발생";
  document.getElementById("desc").innerText = "testName 확인 필요";
} else {
  const result = testData.results[resultIndex];

  document.getElementById("title").innerText = result.title;
  document.getElementById("desc").innerText = result.desc;
}
</script>

</body>
