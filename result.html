<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="result-card">
<img id="result-img">
<h1 id="title"></h1>
<p id="desc"></p>
</div>

<script src="data.js"></script>

<script>
const params = new URLSearchParams(location.search);
const t = params.get("test");
const r = params.get("result");

const result = data[t].results[r];

document.getElementById("title").innerText = result.title;
document.getElementById("desc").innerText = result.desc;
document.getElementById("result-img").src = result.img;
</script>

</body>
</html>
